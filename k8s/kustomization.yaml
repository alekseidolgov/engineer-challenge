apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml        # local only — в production заменить на managed
  - redis.yaml           # local only — в production заменить на managed
  - migrator-job.yaml
  - auth-deployment.yaml
  - auth-service.yaml
  - network-policy.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

images:
  - name: auth-service
    newName: auth-service
    newTag: latest
  - name: auth-migrator
    newName: auth-migrator
    newTag: latest
