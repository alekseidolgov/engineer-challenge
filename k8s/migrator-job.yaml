apiVersion: batch/v1
kind: Job
metadata:
  name: auth-migrator
  namespace: auth
  labels:
    app.kubernetes.io/name: auth-migrator
    app.kubernetes.io/part-of: auth-platform
    app.kubernetes.io/component: migration
  annotations:
    # Helm / ArgoCD: запускать Job перед обновлением Deployment
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-migrator
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrator
          image: auth-migrator:latest
          envFrom:
            - secretRef:
                name: auth-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
