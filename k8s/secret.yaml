# В production: Sealed Secrets / External Secrets Operator / Vault CSI.
# Здесь plain-text для наглядности — НЕ коммитить в production-репозиторий.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: auth
  labels:
    app.kubernetes.io/part-of: auth-platform
type: Opaque
stringData:
  DATABASE_URL: "postgres://auth:auth@postgres:5432/auth?sslmode=disable"
