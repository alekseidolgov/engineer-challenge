services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrator:
    build:
      context: ..
      dockerfile: Dockerfile.migrator
    environment:
      DATABASE_URL: "postgres://auth:auth@postgres:5432/auth?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      GRPC_PORT: "50051"
      DATABASE_URL: "postgres://auth:auth@postgres:5432/auth?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "50051:50051"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
